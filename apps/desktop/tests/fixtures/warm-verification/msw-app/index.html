<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warm verification qualification</title>
    <style>
      :root {
        color: #f5f1e8;
        background: #171612;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
      }
      main {
        box-sizing: border-box;
        min-height: 100vh;
        padding: 48px;
      }
      .meta {
        color: #c8b98d;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin: 28px 0;
      }
      button {
        border: 1px solid #d4a039;
        border-radius: 8px;
        padding: 10px 16px;
        color: #171612;
        background: #d4a039;
        font: inherit;
      }
      dl {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 8px;
      }
      dt {
        color: #c8b98d;
      }
      dd {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
