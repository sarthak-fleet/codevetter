name: Deploy Landing Page

# Rollback: Cloudflare Pages preserves every deployment. Roll back via
# dash.cloudflare.com → Pages → codevetter → Deployments → "Rollback to this
# deployment". The codevetter.com Worker can be rolled back with
# `wrangler versions rollback --config wrangler.worker.jsonc` from
# apps/landing-page-astro/.
on:
  workflow_dispatch:
permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static landing page
        working-directory: apps/landing-page-astro
        run: npm run build

      - name: Build docs (Blume) and merge into /docs
        working-directory: docs-site
        run: |
          npm ci
          npm run build
          rm -rf ../apps/landing-page-astro/dist/docs
          mkdir -p ../apps/landing-page-astro/dist/docs
          cp -r dist/* ../apps/landing-page-astro/dist/docs/

      - name: Verify required static routes
        run: |
          test -f apps/landing-page-astro/dist/index.html
          test -f apps/landing-page-astro/dist/privacy/index.html
          test -f apps/landing-page-astro/dist/download/index.html
          test -f apps/landing-page-astro/dist/sitemap-index.xml
          test -f apps/landing-page-astro/dist/robots.txt
          test -f apps/landing-page-astro/dist/docs/index.html

      - name: Check Cloudflare deploy secrets
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "No Cloudflare deploy token configured; skipping Pages deploy and smoking the live landing page."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.deploy_enabled == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing-page-astro/dist --project-name=codevetter --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy codevetter.com Worker (bypass stale zone cache)
        if: steps.cloudflare.outputs.deploy_enabled == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/landing-page-astro
          command: deploy --config wrangler.worker.jsonc

      - name: Purge codevetter.com edge cache
        if: steps.cloudflare.outputs.deploy_enabled == 'true'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_CODEVETTER }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID_CODEVETTER not set; skipping edge cache purge."
            exit 0
          fi
          response="$(curl --silent --show-error --request POST \
            --url "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --write-out '\nHTTP_STATUS:%{http_code}' \
            --data '{"files":["https://codevetter.com/","https://www.codevetter.com/"]}')"
          status="${response##*HTTP_STATUS:}"
          body="${response%HTTP_STATUS:*}"
          echo "$body"
          if [ "$status" = "200" ]; then
            echo "Edge cache purged for codevetter.com"
            exit 0
          fi
          echo "::warning::Edge cache purge failed (HTTP ${status}). Trying development mode (3h cache bypass)…"
          dev_response="$(curl --silent --show-error --request PATCH \
            --url "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/settings/development_mode" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --write-out '\nHTTP_STATUS:%{http_code}' \
            --data '{"value":"on"}')"
          dev_status="${dev_response##*HTTP_STATUS:}"
          dev_body="${dev_response%HTTP_STATUS:*}"
          echo "$dev_body"
          if [ "$dev_status" != "200" ]; then
            echo "::warning::Development mode also failed (HTTP ${dev_status}). Add Zone.Cache Purge + Zone.Settings to CLOUDFLARE_API_TOKEN, or purge manually."
          else
            echo "Development mode enabled for 3 hours — custom domain should serve fresh HTML."
          fi

      - name: Smoke production landing page
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 20 https://codevetter.com
